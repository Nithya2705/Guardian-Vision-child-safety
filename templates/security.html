<!DOCTYPE html>
<html>
<head>
<title>GuardianVision – Security</title>
<style>
body{margin:0;font-family:Segoe UI;background:#eef2f8;}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:60px 1fr;height:100vh;}
.sidebar{grid-row:1/3;background:#050b1f;color:white;padding:20px;}
.sidebar a{display:block;color:white;padding:12px;cursor:pointer;}
.sidebar a:hover{color:#00f2ff;}
.topbar{background:#0a1230;color:white;padding:0 20px;display:flex;justify-content:space-between;align-items:center;}
.main{padding:20px;}
.page{display:none;}
</style>
</head>

<body>
<div class="app">
<div class="sidebar">
<h2 style="color:#00f2ff">Security</h2>
<a onclick="show('live')">Live</a>
<a onclick="show('alerts')">Alerts</a>
</div>

<div class="topbar">
<select id="cam" onchange="reload()">
<option value="cam1">CAM1</option>
<option value="cam2">CAM2</option>
<option value="cam3">CAM3</option>
<option value="cam4">CAM4</option>
</select>
<a href="/logout" style="color:#00f2ff">Logout</a>
</div>

<div class="main">
<div id="live" class="page" style="display:block"><img id="feed" width="100%"></div>
<div id="alerts" class="page">
<table border="1" width="100%"><tr><th>Time</th><th>Child</th><th>Event</th></tr><tbody id="alertBody"></tbody></table>
</div>
</div>
</div>

<script>
let cam="cam1";
document.getElementById("feed").src="/cctv?cam=cam1";

function show(p){
document.querySelectorAll(".page").forEach(x=>x.style.display="none");
document.getElementById(p).style.display="block";
}

function reload(){
cam=document.getElementById("cam").value;
document.getElementById("feed").src="/cctv?cam="+cam+"&t="+Date.now();
}

function loadAlerts(){
fetch("/alert_table?cam="+cam).then(r=>r.json()).then(d=>{
alertBody.innerHTML=d.data.map(a=>`<tr><td>${a.time}</td><td>${a.child}</td><td>${a.type}</td></tr>`).join("");
});
}
setInterval(loadAlerts,3000);
</script>
</body>
</html>

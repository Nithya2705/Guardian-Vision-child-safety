<!DOCTYPE html>
<html>
<head>
<title>GuardianVision Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
}

/* LEFT SIDE (BRANDING) */
.left{
  width:50%;
  background:linear-gradient(135deg,#0a1230,#1a2a6c);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.left h1{
  font-size:42px;
  color:#00f2ff;
}

.left p{
  margin-top:15px;
  opacity:0.8;
  text-align:center;
  max-width:350px;
}

/* RIGHT SIDE (LOGIN) */
.right{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1023;
}

/* CARD */
.login-box{
  width:360px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.login-box h2{
  color:#00f2ff;
  margin-bottom:25px;
  text-align:center;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:20px;
}

.input-group input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

.input-group label{
  position:absolute;
  top:50%;
  left:14px;
  transform:translateY(-50%);
  color:#aaa;
  transition:0.3s;
  font-size:14px;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#00f2ff;
}

/* PASSWORD ICON */
.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#aaa;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#00f2ff,#00c6ff);
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f2ff;
}

/* LOADING */
.loading{
  opacity:0.7;
  pointer-events:none;
}

/* LINKS */
.links{
  margin-top:20px;
  text-align:center;
}

.links a{
  display:block;
  color:#aaa;
  text-decoration:none;
  margin-top:8px;
}

.links a:hover{
  color:#00f2ff;
}

/* ERROR */
#error{
  color:#ff4d6d;
  margin-top:10px;
  text-align:center;
  display:none;
}

/* MOBILE */
@media(max-width:900px){
  .left{display:none;}
  .right{width:100%;}
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <h1>GuardianVision</h1>
  <p>
    AI-powered child safety monitoring system with real-time alerts,
    smart tracking, and zone detection.
  </p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="login-box">
  <h2>Welcome Back</h2>

  <div class="input-group">
    <input id="username" placeholder=" " required>
    <label>Email or Username</label>
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder=" " required>
    <label>Password</label>
    <span class="eye" onclick="togglePassword()">👁</span>
  </div>

  <button id="loginBtn" onclick="login()">Login</button>

  <div id="error"></div>

  <div class="links">
    <a href="/register">✨ Create Account</a>
    <a href="/forgot">🔐 Forgot Password?</a>
  </div>
</div>

</div>

<script>

function togglePassword(){
  let p=document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

function login(){
  let btn=document.getElementById("loginBtn");
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  let err=document.getElementById("error");

  btn.innerText="Logging in...";
  btn.classList.add("loading");

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"username="+encodeURIComponent(u)+"&password="+encodeURIComponent(p)
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      window.location = d.redirect;
    }else{
      btn.innerText="Login";
      btn.classList.remove("loading");

      err.style.display="block";
      err.innerText="❌ Invalid credentials";
    }
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>GuardianVision – Parent Portal</title>
<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f4f7fb;
}
.app{
  display:grid;
  grid-template-columns:240px 1fr;
  grid-template-rows:60px 1fr;
  height:100vh;
}
.sidebar{
  grid-row:1 / span 2;
  background:#050b1f;
  color:white;
  padding:20px;
}
.sidebar h2{color:#00f2ff;margin-bottom:30px;}
.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:12px 0;
  cursor:pointer;
}
.sidebar a:hover{color:#00f2ff;}

.topbar{
  background:#0a1230;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 25px;
}

.main{
  padding:25px;
  overflow-y:auto;
}

.cards{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}
.card{
  flex:1;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.videoBox{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
th{
  background:#f0f3f7;
}
.statusSafe{color:green;font-weight:bold;}
.statusDanger{color:red;font-weight:bold;}

.page{display:none;}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>GuardianVision</h2>
  <a onclick="showPage('dashboard')">My Child</a>
  <a onclick="showPage('live')">Live Monitoring</a>
  <a onclick="showPage('alerts')">Alerts</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div>👨‍👩‍👧 Parent Portal</div>
  <a href="/logout" style="color:#00f2ff;text-decoration:none;">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page" style="display:block;">
  <div class="cards">
    <div class="card">
      <h3>👶 Child</h3>
      <h2 id="childName">My Child</h2>
    </div>

    <div class="card">
      <h3>Status</h3>
      <h2 id="childStatus" class="statusSafe">Safe</h2>
    </div>

    <div class="card">
      <h3>Last Update</h3>
      <h2 id="timeNow">--:--</h2>
    </div>
  </div>
</div>

<!-- LIVE -->
<div id="live" class="page">
  <div class="videoBox">
    <h3>📤 Upload Video</h3>
    <input type="file" id="videoFile">
    <button onclick="uploadVideo()">Upload</button>
    <p id="uploadStatus"></p>
  </div>

  <div class="videoBox">
    <h3>📹 Child Live Feed</h3>
    <img id="feed" width="100%">
  </div>
</div>


<!-- ALERTS -->
<div id="alerts" class="page">
  <div class="videoBox">
    <h3>⚠ Safety Alerts</h3>
    <table>
      <thead>
        <tr><th>Time</th><th>Event</th></tr>
      </thead>
      <tbody id="alertBody"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>


function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  document.getElementById(p).style.display="block";
}

function updateTime(){
  let now=new Date();
  document.getElementById("timeNow").innerText=now.toLocaleTimeString();
}
setInterval(updateTime,1000);


function uploadVideo(){
  let f = document.getElementById("videoFile").files[0];
  if(!f){ alert("Select a video"); return; }

  let fd = new FormData();
  fd.append("video", f);

  fetch("/parent_upload", {method:"POST", body:fd})
  .then(r=>r.text())
  .then(t=>{
    document.getElementById("uploadStatus").innerText = "Video uploaded successfully!";
    document.getElementById("feed").src="/parent_video?t="+new Date().getTime();
  });
}


</script>

</body>
</html>
